<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AUMA Display</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  img {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  img.active {
    opacity: 1;
  }
</style>

</head>
<body>

<img id="img1">
<img id="img2">

<script>
const images = [
  "image1.jpg",
  "image2.jpg",
  "image3.jpg"
];

let index = 0;
const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");

img1.src = images[0];
img1.classList.add("active");

setInterval(() => {
  index = (index + 1) % images.length;

  if (img1.classList.contains("active")) {
    img2.src = images[index];
    img2.classList.add("active");
    img1.classList.remove("active");
  } else {
    img1.src = images[index];
    img1.classList.add("active");
    img2.classList.remove("active");
  }

}, 15000); // 5 secondes par image
</script>

</body>
</html>
